body:
  text: 孝經刋誤古今文有不同者别見考異宋朱子編仲尼閒居曾子侍坐子曰參先王有至德要道以順天下民用和睦上下無怨汝知之乎曾子避席曰參不敏何足以知之子曰夫孝德之本也教之所由生復坐吾語汝身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身大雅云無念爾祖聿修厥德子曰愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而德教加於百姓刑於四海蓋天子之孝甫刑云一人有慶兆民頼之在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴滿而不溢所以長守富富貴不離其身然後能保其社稷而和其民人蓋諸侯之孝詩云戰戰兢兢如臨深淵如履薄氷非先王之法服不敢服非先王之法言不敢道非先王之德行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟蓋卿大夫之孝也詩云夙夜匪懈以事一人資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其爵禄而守其祭祀蓋士之孝也詩云夙興夜寐無忝爾所生子曰用天之道因地之利謹身節用以養父母此庻人之孝也故自天子以下至於庻人孝無終始而患不及者未之有也此一節夫子曾子問答之言而曾氏門人之所記也疑所謂孝經者其本文止如此其下則或者雜引傳記以釋經文乃孝經之傳也竊嘗考之傳文固多傅㑹而經文亦不免有離析增加之失顧自漢以來諸儒傳誦莫覺其非至或以為孔子之所自著則又可笑之尤者蓋經之首統論孝之終始中乃敷陳天子諸侯卿大夫士庻人之孝而其末結之曰故自天子以下至於庶人孝無終始而患不及者未之有也其首尾相應次第相承文勢連屬脈絡通貫同是一時之言無可疑者而後人妄分以為六七章今文作六章古文作七章又增子曰及引詩書之文以雜乎其間使其文意分斷間隔而讀者不復得見聖言全體大義為害不細故今定此六七章者合為一章而删去子曰者二引書者一引詩者四凡六十一字以復經文之舊其傳文之失又别論之如左方曾子曰甚哉孝之大也子曰夫孝天之經地之義民之行天地之經而民是則之則天之明因地之義以順天下是以其教不肅而成其政不嚴而治先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以德義而民興行先之以敬讓而民不爭導之以禮樂而民和睦示之以好惡而民知禁詩云赫赫師尹民具爾瞻此以下皆傳文而此一節蓋釋以順天下之意當為傳之三章而今失其次矣但自其章首以至因地之義皆是春秋左氏傳所載子太叔為趙簡子道子産之言惟易禮字為孝字而文勢反不若彼之通貫條目反不若彼之完備明此襲彼非彼取此無疑也子産曰夫禮天之經地之義民之行也天地之經而民實則之則天之明因地之性其下便陳天明地性之目與其所以則之因之之實然後簡子賛之曰甚哉禮之大也首尾通貫節目詳備與此不同其曰先王見教之可以化民又與上文不相屬故温公改教為孝乃得粗通而下文所謂德義敬讓禮樂好惡者却不相應疑亦裂取他書之成文而强加装綴以為孔子曾子之問答但未見其所出耳然其前段文雖非是而理猶可通存之無害至於後段則文既可疑而謂聖人見孝可以化民而後以身先之於理又已悖矣况先之以博愛亦非立愛惟親之序若之何而能使民不遺其親耶其所引詩亦不親切今定先王見教以下凡六十九字並删去子曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之懽心以事其先王治國者不敢侮於鰥寡而况於士民乎故得百姓之懽心以事其先君治家者不敢失於臣妾而况於妻子乎故得人之懽心以事其親夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下如此詩云有覺德行四國順之此一節釋民用和睦上下無怨之意為傳之四章其言雖善而亦非經文之正意蓋經以孝而和此以和而孝也引詩亦無甚失且其下文語已更端無所隔礙故今且得仍舊耳後不言合删改者放此曾子曰敢問聖人之德其無以加於孝乎子曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來助祭夫聖人之德又何以加於孝乎故親生之膝下以養父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也此一節釋孝德之本之意傳之五章也但嚴父配天本因論武王周公之事而贊美其孝之詞非謂凡為孝者皆欲如此也又况孝之所以為大者本自有親切處而非此之謂乎若必如此而後為孝則是使為人臣子者皆有今将之心而反陷於大不孝矣作傳者但見其論孝之大即以附此而不知其非所以為天下之通訓讀者詳之不以文害意焉可也其曰故親生之膝下以下意郤親切但與上文不屬而與下章相近故今文連下二章為一章但下章之首語己更端意亦重複不當通為一章此語當依古文且附上章或自别為一章可也子曰父子之道天性君臣之義父母生之續莫大焉君親臨之厚莫重焉子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶徳雖得之君子所不貴君子則不然言斯可道行斯可樂德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行政令詩云淑人君子其儀不忒此一節釋教之所由生之意傳之六章也古文析不愛其親以下别為一章而各冠以子曰今文則合之而又通上章為一章無此二子曰字而於不愛其親之上加故字今詳此章之首語實更端當以古文為正不愛其親語意正與上文相續當以今文為正至君臣之義之下則又當有斷簡焉今不能知其為何字也悖禮以上皆格言但以順則逆以下則又雜取左傳所載季文子北宫文子之言與此上文既不相應而彼此得失又如前章所論子産之語今删去凡九十字季文子曰以訓則昏民無則焉不度於善而皆在於凶德是以去之北宫文子曰君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下子曰孝子之事親居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵此三者不除雖日用三牲之養猶為不孝也此一節釋始於事親及不敢毁傷之意乃傳之七章亦格言也子曰五刑之屬三千而罪莫大於不孝要君者無上非聖人者無法非孝者無親此大亂之道也此一節因上文不孝之云而繫於此乃傳之八章亦格言也子曰教民親愛莫善於孝教民禮順莫善於弟移風易俗莫善於樂安上治民莫善於禮禮者敬而已矣故敬其父則子悦敬其兄則弟悦敬其君則臣悦敬一人而千萬人悦所敬者寡而悦者衆此之謂要道此一節釋要道之意當為傳之二章但經所謂要道當自已而推之與此亦不同也子曰君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者教以悌所以敬天下之為人兄者教以臣所以敬天下之為人君者詩云愷悌君子民之父母非至德其孰能順民如此其大者乎此一節釋至德以順天下之意當為傳之首章然所論至德語意亦疎如上章之失云子曰昔者明王事父孝故事天明事母孝故事地察長㓜順故上下治天地明察神明彰矣故雖天子必有尊也言有父也必有先也言有兄也宗廟至敬不忘親也修身慎行恐辱先也宗廟致敬鬼神著矣孝悌之至通於神明光於四海無所不通詩云自西自東自南自北無思不服此一節釋天子之孝有格言焉當為傳之十章或云宜為十二章子曰君子之事親孝故忠可移於君事兄悌故順可移於長居家理故治可移於官是故行成於内而名立於後世矣此一節釋立身揚名及士之孝傳之十一章也或云宜為九章子曰閨門之内具禮矣乎嚴父嚴兄妻子臣妾猶百姓徒役也此一節因上章三可移而言傳之十二章也嚴父孝也嚴兄悌也妻子臣妾官也或云宜為十章曾子曰若夫慈愛恭敬安親揚名參聞命矣敢問從父之令可謂孝乎子曰是何言與是何言與昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義故當不義則子不可以弗爭於父臣不可以弗爭於君故當不義則爭之從父之令又焉得為孝乎此不觧經而别𤼵一義宜為傳之十三章子曰君子事上進思盡忠退思補過将順其美匡救其惡故上下能相親詩曰心乎愛矣遐不謂矣中心藏之何日忘之此一節釋中於事君之意當為傳之九章或云宜為十一章因上章爭臣而誤屬於此耳進思盡忠退思補過亦左傳所載士貞子語然於文理無害引詩亦足以𤼵明移孝事君之意今並存之子曰孝子之喪親哭不偯禮無容言不文服美不安聞樂不樂食㫖不甘此哀戚之情三日而食教民無以死傷生毁不滅性此聖人之政喪不過三年示民有終為之棺槨衣衾而舉之陳其簠簋而哀戚之擗踊哭泣哀以送之卜其宅兆而安措之為之宗廟以鬼享之春秋祭祀以時思之生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣傳之十四章亦不觧經而别𤼵一義其語尤精約也熹舊見衡山胡侍郎論語説疑孝經引詩非經本文初甚駭焉徐而察之始悟胡公之言為信而孝經之可疑者不但此也因以書質之沙隨程可久丈程答書曰頃見玉山汪端明亦以為此書多出後人傅㑹於是乃知前軰讀書精審其論固己及又竊竊自幸有所因述而得免於鑿空妄言之罪也因欲掇取他書之言可𤼵此經之㫖者别為外傳如冬温夏凊昏定晨省之類即附始於事親之傳顧未敢耳淳熈丙午八月十二日記孔叢子亦偽書而多用左氏語者但孝經相傳已久蓋出於漢初左氏未盛行之時不知何世何人為之也孔叢子叙事至東漢然其詞氣甚卑近亦非東漢人作所載孔臧兄弟徃還書疏正類西京雜記中偽造漢人文章西京雜記之繆匡衡傳注中顔氏已辨之可考皆甚可笑所言不肯為三公等事以前書考之亦無其實而通鑑皆誤信之其他此類不一欲作一書論之而未暇也姑記於此云孝經刋誤
