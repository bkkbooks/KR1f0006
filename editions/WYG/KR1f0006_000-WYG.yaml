body:
  text: 孝經刋誤孝經類提要臣等謹按孝經刋誤一卷宋朱子撰書成於淳熙十三年朱子年五十七主管華州雲臺觀時作也取古文孝經分為經一章傳十四章刪舊文二百二十三字後有自記曰熹舊見衡山胡侍郎論語説案胡宏高宗時為禮部侍郎居衡州故曰衡山所著有五峯論語指南一卷疑孝經引詩非經本文初甚駭焉徐而察之始悟胡公之言為信而孝經之可疑者不但此也因以書質之沙随程可久丈案可久程迥之字也程答書曰頃見王山汪端明案汪應辰孝宗時為端明殿學士亦以此書多出後人附㑹于是乃知前輩讀書精審其論固己及此竊幸有所因述而得免于鑿空妄言之罪云云今以朱子語録考之黄㽦記云孝經除了後人所添前面子曰及後面引詩便有首尾又云順則逆民無則焉是季文子之詞言斯可道行斯可樂一段是北宫文子論令尹之威儀在左傳中自有首尾載入孝經都不接續全無意思又葉賀孫記云古文孝經有不似今文順者如父母生之續莫大焉又著一个子曰字方説不愛其親而愛他人者謂之悖徳此本是一段以子曰分為二恐不是又輔廣記云孝莫大于嚴父嚴父莫大于配天豈不害理如此則湏是如武王周公方能盡孝道尋常人都無分豈不啓人僣亂之心是朱子詆毁此書已非一日特不欲自居于改經故托之胡宏汪應辰耳歐陽修詩本義曰刪詩云者非止全篇刪去也或篇刪其章或章刪其句或句刪其字引唐棣君子偕老節南山三詩為證朱子盖陰用是例也陳振孫書録解題載此書註其下曰抱遺經于千載之後而能卓然悟疑辨惑非豪傑特起獨立之士何以及此此後學所不敢仿效而亦不敢擬議也斯言允矣南宋以後作註者多用此本故今特著於録見諸儒渊源之所自與門戸之所以分焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
